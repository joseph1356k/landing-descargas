<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>U para Windows</title>
  <meta name="description" content="Descarga U, el agente de escritorio para Windows: aprende tus rutinas y actúa por ti." />
  <meta name="theme-color" content="#020202" />
  <meta property="og:title" content="U para Windows" />
  <meta property="og:description" content="Tu propio agente de escritorio. Aprende tus rutinas y actúa por ti." />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />

  <link rel="stylesheet" href="https://graph-eight-pied.vercel.app/provider-studio.css">
  <script src="https://graph-eight-pied.vercel.app/miracle-bg.js" defer></script>

  <style>
    .windows-landing {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
    }

    .windows-landing-copy {
      display: grid;
      justify-items: center;
      gap: 28px;
      max-width: 640px;
    }

    .windows-landing p.lead {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .windows-landing-cta {
      height: 64px;
      padding: 0 44px;
      font-size: 1.05rem;
      margin: 0;
    }

    .windows-landing-note {
      margin: 0;
      color: var(--dim);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <main class="studio-shell windows-landing">
    <div class="windows-landing-copy">
      <div class="studio-hero-mark" aria-hidden="true">
        <svg viewBox="0 0 60 54"><path d="M30 3 57 51H3Z"/></svg>
      </div>
      <h1>Ü para tu escritorio</h1>
      <p class="lead">Un agente que ve tu pantalla, aprende tus rutinas y las ejecuta por ti. Instálalo en Windows en menos de un minuto.</p>
      <a class="button primary windows-landing-cta" href="https://graph-eight-pied.vercel.app/api/windows/latest-installer">Descargar App</a>
      <p class="windows-landing-note">Windows 10/11 · 64 bits</p>
    </div>
  </main>
</body>
</html>
